<!DOCTYPE html>
<html lang="tr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>3D Vitrin Yönetim Paneli</title>
  <style>
    :root {
      --bg: #1a1a1a; --surface: #242424; --primary: #d4a574; --text: #f0f0f0; --border: #333;
    }
    * { margin:0; padding:0; box-sizing:border-box; font-family:'Segoe UI', system-ui, sans-serif; }
    body { background-color: var(--bg); color: var(--text); padding: 40px 20px; }
    
    .container { max-width: 800px; margin: 0 auto; }
    
    .header { text-align: center; margin-bottom: 40px; }
    .header h1 { color: var(--primary); font-size: 28px; margin-bottom: 10px; }
    .header p { color: #888; font-size: 15px; }
    .header a { display:inline-block; margin-top:15px; color:#aaa; text-decoration:none; border-bottom:1px solid #aaa; padding-bottom:2px; }
    .header a:hover { color:var(--primary); border-color:var(--primary); }

    .card { background: var(--surface); border: 1px solid var(--border); border-radius: 16px; padding: 24px; margin-bottom: 24px; }
    .card h2 { font-size: 18px; margin-bottom: 20px; padding-bottom: 10px; border-bottom: 1px solid var(--border); }
    
    .form-group { margin-bottom: 16px; }
    .form-group label { display: block; margin-bottom: 8px; font-size: 13px; color: #aaa; text-transform: uppercase; letter-spacing: 1px; }
    .form-group input { width: 100%; padding: 12px; background: rgba(0,0,0,0.2); border: 1px solid var(--border); border-radius: 8px; color: white; font-size: 14px; transition: border-color 0.3s; }
    .form-group input:focus { outline: none; border-color: var(--primary); }
    
    .btn { display: inline-block; background: var(--primary); color: #111; border: none; padding: 12px 24px; border-radius: 8px; font-weight: 600; cursor: pointer; transition: 0.2s; font-size: 14px; }
    .btn:hover { filter: brightness(1.1); transform: translateY(-2px); }
    .btn-danger { background: rgba(224, 112, 96, 0.2); color: #e07060; padding: 8px 16px; font-size: 12px; }
    .btn-danger:hover { background: rgba(224, 112, 96, 0.4); }

    .product-list { display: flex; flex-direction: column; gap: 12px; }
    .product-item { display: flex; align-items: center; gap: 16px; background: rgba(0,0,0,0.2); padding: 12px; border-radius: 12px; border: 1px solid var(--border); }
    .product-img { width: 60px; height: 60px; border-radius: 8px; object-fit: cover; background: #333; }
    .product-info { flex: 1; }
    .product-title { font-weight: 600; font-size: 16px; margin-bottom: 4px; }
    .product-url { font-size: 12px; color: #888; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; max-width: 400px; }
    
    .empty-state { text-align: center; padding: 30px; color: #888; font-style: italic; }
  </style>
</head>
<body>

  <div class="container">
    <div class="header">
      <h1>3D Vitrin Yönetim Paneli</h1>
      <p>Luma AI'dan aldığınız taramaları portfolyonuza ekleyin.</p>
      <a href="/pages/test.html" target="_blank">Vitrini Görüntüle (test.html) &rarr;</a>
    </div>

    <div class="card">
      <h2>&#10133; Yeni 3D Ürün Ekle</h2>
      <form id="add-form">
        <div class="form-group">
          <label>Ürün Başlığı (Menüde ve 3D Obje Üzerinde Yazacak İsim)</label>
          <input type="text" id="p-title" placeholder="Örn: Spider-Man Kupa" required>
        </div>
        <div class="form-group">
          <label>Luma AI Linki (URL)</label>
          <input type="url" id="p-url" placeholder="Örn: https://lumalabs.ai/capture/..." required>
        </div>
        <div class="form-group">
          <label>Kapak Fotoğrafı Seçin</label>
          <input type="file" id="p-thumb-file" accept="image/*">
          <input type="hidden" id="p-thumb-base64">
        </div>
        <button type="submit" class="btn">Vitrine Ekle</button>
      </form>
    </div>

    <div class="card">
      <h2>&#128230; Eklenen Ürünler</h2>
      <div class="product-list" id="product-list">
        <!-- JS ile dolacak -->
      </div>
    </div>
  </div>

  <script>
    const defaultThumb = 'https://images.unsplash.com/photo-1618005182384-a83a8bd57fbe?q=80&w=200&auto=format&fit=crop';
    
    const API_URL = 'https://vk-portfolio-api.vkesgin38.workers.dev/api/fitness';
    const TOKEN = localStorage.getItem('vk_admin_token') || '';

    let localProducts = [];

    // Verileri Yükle
    async function loadProducts() {
      let loadedFromApi = false;
      try {
        const res = await fetch(API_URL);
        if (res.ok) {
          const data = await res.json();
          const row = data.find(d => d.key === 'vk_3d_products');
          if (row && row.value) {
            localProducts = JSON.parse(row.value);
            localStorage.setItem('vk_3d_products', row.value);
            loadedFromApi = true;
          }
        }
      } catch(e) {}
      
      if (!loadedFromApi) {
        const saved = localStorage.getItem('vk_3d_products');
        if (saved) {
          localProducts = JSON.parse(saved);
          if (localProducts.length > 0) saveProducts(localProducts); // Otomatik Senkronize Et
        }
      }
      renderList();
    }

    // Verileri Kaydet (API'ye Gönder)
    async function saveProducts(products) {
      localProducts = products;
      localStorage.setItem('vk_3d_products', JSON.stringify(products)); // Anında hız için yerele yaz
      renderList(); // Ekranı hemen güncelle
      
      try {
        await fetch(API_URL, {
          method: 'POST',
          headers: { 
            'Content-Type': 'application/json',
            'Authorization': 'Bearer ' + TOKEN
          },
          body: JSON.stringify({ key: 'vk_3d_products', value: JSON.stringify(products) })
        });
      } catch(e) {
        console.error('API senkronizasyon hatası:', e);
        alert('Uyarı: Sunucuya kaydedilirken hata oluştu. Sadece bu tarayıcıda görünecek.');
      }
    }

    // Listeyi Çiz
    function renderList() {
      const listEl = document.getElementById('product-list');
      if (!localProducts || localProducts.length === 0) {
        listEl.innerHTML = '<div class="empty-state">Henüz hiç ürün eklemediniz.</div>';
        return;
      }
      listEl.innerHTML = localProducts.map(p => `
        <div class="product-item">
          <img src="${p.thumb || defaultThumb}" class="product-img" alt="thumb">
          <div class="product-info">
            <div class="product-title">${p.title}</div>
            <div class="product-url">${p.lumaUrl}</div>
          </div>
          <button class="btn btn-danger" onclick="deleteProduct('${p.id}')">Sil</button>
        </div>
      `).join('');
    }

    // Görsel Seçildiğinde Base64'e çevir
    document.getElementById('p-thumb-file').addEventListener('change', function(e) {
      const file = e.target.files[0];
      if (!file) return;
      const reader = new FileReader();
      reader.onload = function(event) {
        document.getElementById('p-thumb-base64').value = event.target.result;
      };
      reader.readAsDataURL(file);
    });

    // Ürün Ekle
    document.getElementById('add-form').addEventListener('submit', async (e) => {
      e.preventDefault();
      
      const title = document.getElementById('p-title').value.trim();
      let url = document.getElementById('p-url').value.trim();
      let thumb = document.getElementById('p-thumb-base64').value;

      // Luma linkini formatla
      const match = url.match(/[0-9a-fA-F]{8}-[0-9a-fA-F]{4}-[0-9a-fA-F]{4}-[0-9a-fA-F]{4}-[0-9a-fA-F]{12}/);
      if (match) url = 'https://lumalabs.ai/capture/' + match[0];
      if (!thumb) thumb = defaultThumb;

      const newProduct = {
        id: 'p_' + Date.now(),
        title: title,
        lumaUrl: url,
        thumb: thumb
      };

      const updated = [...localProducts, newProduct];
      await saveProducts(updated);

      e.target.reset();
      document.getElementById('p-thumb-base64').value = '';
      alert(title + ' vitrine eklendi ve tüm cihazlarla eşitlendi!');
    });

    // Ürün Sil
    window.deleteProduct = async function(id) {
      if(confirm('Bu ürünü vitrinden silmek istediğinize emin misiniz?')) {
        const updated = localProducts.filter(p => p.id !== id);
        await saveProducts(updated);
      }
    };

    // İlk Yükleme
    loadProducts();
  </script>
</body>
</html>
