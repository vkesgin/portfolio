<!DOCTYPE html>
<html lang="tr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Premium 3D Showcase</title>
  <style>
    * { margin:0; padding:0; box-sizing:border-box; }
    body { overflow:hidden; background:#1a1a1a; font-family:'Segoe UI', sans-serif; }
    canvas { display:block; width:100vw; height:100vh; cursor:grab; }
    canvas:active { cursor:grabbing; }

    /* Loading Screen */
    #loading {
      position:fixed; inset:0; background:#161311;
      display:flex; flex-direction:column; align-items:center; justify-content:center; gap:20px;
      z-index:999; transition:opacity 1s ease, backdrop-filter 1s ease;
    }
    #loading.fade { opacity:0; pointer-events:none; }
    .loader-ring {
      width:60px; height:60px; border:2px solid rgba(212,165,116,0.1);
      border-top-color:#d4a574; border-radius:50%; animation:spin 1s cubic-bezier(0.6, 0.2, 0.4, 0.8) infinite;
    }
    @keyframes spin { to { transform:rotate(360deg); } }
    .loader-text { color:#d4a574; font-size:14px; letter-spacing:4px; text-transform:uppercase; opacity:0.8; }

    /* Bottom Gallery Menu */
    #gallery-menu {
      position:fixed; bottom:30px; left:50%; transform:translateX(-50%);
      display:flex; gap:16px; padding:16px;
      background:rgba(20, 16, 14, 0.6); border:1px solid rgba(212,165,116,0.2);
      border-radius:24px; backdrop-filter:blur(20px); -webkit-backdrop-filter:blur(20px);
      max-width:90vw; overflow-x:auto; scroll-behavior:smooth;
      box-shadow: 0 10px 40px rgba(0,0,0,0.5); z-index:50;
    }
    #gallery-menu::-webkit-scrollbar { display:none; }
    
    .gallery-item {
      width:100px; height:100px; border-radius:16px; flex-shrink:0;
      position:relative; cursor:pointer; overflow:hidden;
      border:1px solid rgba(255,255,255,0.05); transition:all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
      background: linear-gradient(135deg, #2a221c, #1a1512);
    }
    .gallery-item:hover {
      transform:translateY(-5px); border-color:rgba(212,165,116,0.5);
      box-shadow: 0 8px 20px rgba(212,165,116,0.2);
    }
    .gallery-item.active {
      border-color:#d4a574; transform:translateY(-10px);
      box-shadow: 0 12px 24px rgba(212,165,116,0.3);
    }
    .menu-item.active {
      background: var(--primary);
      color: #111;
      border-color: var(--primary);
      box-shadow: 0 4px 15px rgba(212,165,116,0.3);
    }
    
    /* ─── YENİ: ÜRÜN İSMİ ÖN EKRAN OVERLAY ─── */
    #ui-overlay {
      position: absolute;
      top: 15%; /* Üstten biraz boşluk */
      left: 50%;
      transform: translateX(-50%);
      pointer-events: none;
      z-index: 10;
      text-align: center;
      width: 100%;
      display: none; /* Artık kullanılmıyor - troika ile 3D sahnede */
    }

    .gallery-item img {
      width:100%; height:100%; object-fit:cover; opacity:0.6; transition:0.3s;
    }
    .gallery-item:hover img, .gallery-item.active img { opacity:1; }
    
    .gallery-title {
      position:absolute; bottom:0; left:0; right:0;
      padding:12px 8px 8px; background:linear-gradient(to top, rgba(0,0,0,0.9), transparent);
      color:#fff; font-size:11px; text-align:center; font-weight:600; letter-spacing:1px;
      text-transform:uppercase;
    }

    /* Overlay Vignette */
    .vignette {
      position:fixed; inset:0; pointer-events:none; z-index:10;
      background: radial-gradient(circle at center, transparent 30%, rgba(15,12,10,0.7) 120%);
    }

    /* ─── METİN KONUM EDİTÖRÜ ─── */
    #pos-toggle {
      position: fixed; top: 20px; right: 20px; z-index: 200;
      width: 44px; height: 44px; border-radius: 50%;
      background: rgba(212,165,116,0.15); border: 1px solid rgba(212,165,116,0.4);
      color: #d4a574; font-size: 20px; cursor: pointer;
      display: flex; align-items: center; justify-content: center;
      backdrop-filter: blur(10px); transition: all 0.2s;
    }
    #pos-toggle:hover { background: rgba(212,165,116,0.3); }

    #pos-panel {
      position: fixed; top: 74px; right: 20px; z-index: 200;
      background: rgba(20,16,14,0.92); border: 1px solid rgba(212,165,116,0.3);
      border-radius: 16px; padding: 20px; width: 260px;
      backdrop-filter: blur(20px); display: none;
      font-family: 'Segoe UI', sans-serif; color: #f0f0f0;
      box-shadow: 0 8px 32px rgba(0,0,0,0.6);
    }
    #pos-panel h3 { font-size: 13px; letter-spacing: 2px; text-transform: uppercase;
      color: #d4a574; margin-bottom: 16px; }
    .pos-row { margin-bottom: 14px; }
    .pos-row label { display: flex; justify-content: space-between;
      font-size: 12px; color: #aaa; margin-bottom: 6px; }
    .pos-row label span { color: #d4a574; font-weight: 600; }
    .pos-row input[type=range] {
      width: 100%; accent-color: #d4a574; cursor: pointer;
    }
    #pos-save {
      width: 100%; padding: 10px; border: none; border-radius: 8px;
      background: #d4a574; color: #111; font-weight: 700; font-size: 13px;
      cursor: pointer; margin-top: 4px; transition: 0.2s;
      letter-spacing: 1px; text-transform: uppercase;
    }
    #pos-save:hover { filter: brightness(1.1); }
    #pos-hint { font-size: 11px; color: #666; text-align: center; margin-top: 10px; }
  </style>
</head>
<body>

  <!-- Loading -->
  <div id="loading">
    <div class="loader-ring"></div>
    <div class="loader-text" id="loading-text">YÜKLENİYOR</div>
  </div>

  <div class="vignette"></div>
  <canvas id="canvas"></canvas>

  <!-- Metin Konum Editörü -->
  <button id="pos-toggle" title="Yazı konumunu ayarla">⚙️</button>
  <div id="pos-panel">
    <h3>📝 Yazı Konumu</h3>
    <div class="pos-row">
      <label>Sol ↔ Sağ (X) <span id="val-x">0.0</span></label>
      <input type="range" id="sl-x" min="-4" max="4" step="0.1" value="0">
    </div>
    <div class="pos-row">
      <label>Aşağı ↕ Yukarı (Y) <span id="val-y">-0.6</span></label>
      <input type="range" id="sl-y" min="-3" max="3" step="0.1" value="-0.6">
    </div>
    <div class="pos-row">
      <label>İleri ↔ Geri (Z) <span id="val-z">1.8</span></label>
      <input type="range" id="sl-z" min="-4" max="4" step="0.1" value="1.8">
    </div>
    <div class="pos-row">
      <label>Boyut <span id="val-s">0.28</span></label>
      <input type="range" id="sl-s" min="0.1" max="1.0" step="0.02" value="0.28">
    </div>
    <button id="pos-save">✔ Kaydet</button>
    <div id="pos-hint">Bu ayarlar sadece bu ürün için kaydedilir</div>
  </div>

  <!-- Bottom Gallery Menu -->
  <div id="gallery-menu"></div>

  <script type="importmap">
  {
    "imports": {
      "three": "https://unpkg.com/three@0.160.0/build/three.module.js",
      "three/addons/": "https://unpkg.com/three@0.160.0/examples/jsm/",
      "@lumaai/luma-web": "https://unpkg.com/@lumaai/luma-web@0.2.0/dist/library/luma-web.module.js",
      "troika-three-text": "https://esm.sh/troika-three-text@0.49.0?external=three"
    }
  }
  </script>

  <script type="module">
    import * as THREE from 'three';
    import { LumaSplatsThree } from '@lumaai/luma-web';
    import { Text, preloadFont } from 'troika-three-text';

    // ─── VERİTABANI (Admin panelinden dolacak) ───
    const defaultProducts = [
      { 
        id: "p1", 
        title: "Spider-Man", 
        lumaUrl: "https://lumalabs.ai/capture/3a8971f8-84c5-4a16-ad31-db90ea9d1380",
        thumb: "https://images.unsplash.com/photo-1608889175123-8ee362201f81?q=80&w=200&auto=format&fit=crop"
      },
      { 
        id: "p2", 
        title: "Vintage Car", 
        lumaUrl: "https://lumalabs.ai/capture/1b5f3e33-3900-4398-8795-b585ae1337d0",
        thumb: "https://images.unsplash.com/photo-1532974208-724bc4b1c1e5?q=80&w=200&auto=format&fit=crop"
      }
    ];

    let products = [];
    
    // 1. Önce Global API'den veriyi çekmeyi dene
    try {
      const res = await fetch('https://vk-portfolio-api.vkesgin38.workers.dev/api/fitness');
      if (res.ok) {
        const dbData = await res.json();
        const row = dbData.find(d => d.key === 'vk_3d_products');
        if (row && row.value) {
          products = JSON.parse(row.value);
          localStorage.setItem('vk_3d_products', row.value); // Cihaza yedekle
        }
      }
    } catch(e) { console.warn('API fetch failed, falling back to local'); }
    
    // 2. API boşsa veya çöktüyse yerel önbelleğe (localStorage) bak
    if (!products || products.length === 0) {
      try {
        const saved = localStorage.getItem('vk_3d_products');
        if (saved) products = JSON.parse(saved);
      } catch(e) {}
    }
    
    // 3. Hiçbiri yoksa varsayılan ürünleri kullan
    if (!products || products.length === 0) {
      products = defaultProducts;
      localStorage.setItem('vk_3d_products', JSON.stringify(products));
    }

    let currentProduct = products[0];

    const isMobile = window.innerWidth < 768;

    // ─── SAHNE KURULUMU ───
    const canvas = document.getElementById('canvas');
    const renderer = new THREE.WebGLRenderer({ 
      canvas, 
      antialias: !isMobile, // Mobilde kasmayı engellemek için AA kapalı
      alpha: false 
    });
    // Mobilde performansı katlamak için piksel oranını 1'e sabitle (Masaüstü aynen kalıyor)
    renderer.setPixelRatio(isMobile ? 1 : Math.min(window.devicePixelRatio, 2));
    renderer.setSize(window.innerWidth, window.innerHeight);

    const scene = new THREE.Scene();
    scene.background = new THREE.Color(0x1a1512); // Koyu premium arkaplan
    scene.fog = new THREE.FogExp2(0x1a1512, 0.08); // Derinlik hissi için sis

    const camera = new THREE.PerspectiveCamera(45, window.innerWidth / window.innerHeight, 0.1, 100);

    // Işıklandırma
    scene.add(new THREE.AmbientLight(0xffeedd, 0.5));
    const dirLight = new THREE.DirectionalLight(0xd4a574, 1.5);
    dirLight.position.set(5, 10, 5);
    scene.add(dirLight);

    // ─── PARTİKÜL EFEKTİ ───
    // Mobilde 300, masaüstünde 1200 partikül
    const pCount = isMobile ? 300 : 1200;
    const pPos = new Float32Array(pCount * 3);
    for (let i = 0; i < pCount; i++) {
      const r = 3 + Math.random() * 7;
      const th = Math.random() * Math.PI * 2;
      const ph = (Math.random() - 0.5) * Math.PI * 0.8;
      pPos[i*3]   = r * Math.cos(th) * Math.cos(ph);
      pPos[i*3+1] = (Math.random() - 0.2) * 5; // Yüksekliğe dağıt
      pPos[i*3+2] = r * Math.sin(th) * Math.cos(ph);
    }
    const pGeo = new THREE.BufferGeometry();
    pGeo.setAttribute('position', new THREE.BufferAttribute(pPos, 3));
    const particles = new THREE.Points(pGeo, new THREE.PointsMaterial({ 
      size: 0.02, color: 0xd4a574, transparent: true, opacity: 0.6, blending: THREE.AdditiveBlending 
    }));
    scene.add(particles);

    // ─── 3D YAZI SİSTEMİ ───
    const FONT_URL = 'https://cdn.jsdelivr.net/gh/googlefonts/montserrat@master/fonts/ttf/Montserrat-Bold.ttf';
    let textMesh = null;
    let textExtrusions = [];
    let currentTextOpacity = 1; // Başlangıçta görünür

    // Varsayılan konum - her ürün kendi offset'ini saklayabilir
    function getTextOffset(product) {
      return product.textOffset || { x: 0, y: -0.6, z: 1.8, s: 0.28 };
    }

    preloadFont({ font: FONT_URL }, () => {});

    function buildTextLayers(textStr, offset) {
      // Temizle
      if (textMesh) { scene.remove(textMesh); textMesh.dispose(); textMesh = null; }
      textExtrusions.forEach(t => { scene.remove(t); t.dispose(); });
      textExtrusions = [];

      // Extrusion katmanları (arka, amber/gold)
      for (let i = 6; i >= 1; i--) {
        const t = new Text();
        t.font = FONT_URL; t.text = textStr;
        t.fontSize = offset.s; t.anchorX = 'center'; t.anchorY = 'middle';
        t.letterSpacing = 0.05; t.maxWidth = 5; t.textAlign = 'center';
        t.position.set(offset.x, offset.y, offset.z - i * 0.022);
        t.rotation.y = Math.PI;
        t.material = new THREE.MeshBasicMaterial({
          color: 0xd4a574, transparent: true,
          opacity: Math.max(0, 0.5 - i * 0.06), depthWrite: false
        });
        t.renderOrder = 10 + (6 - i);
        t.sync();
        textExtrusions.push(t);
        scene.add(t);
      }

      // Ana beyaz metin (en önde)
      textMesh = new Text();
      textMesh.font = FONT_URL; textMesh.text = textStr;
      textMesh.fontSize = offset.s; textMesh.anchorX = 'center'; textMesh.anchorY = 'middle';
      textMesh.letterSpacing = 0.05; textMesh.maxWidth = 5; textMesh.textAlign = 'center';
      textMesh.position.set(offset.x, offset.y, offset.z);
      textMesh.rotation.y = Math.PI;
      textMesh.material = new THREE.MeshBasicMaterial({
        color: 0xffffff, transparent: true, opacity: 0.95, depthWrite: false
      });
      textMesh.renderOrder = 20;
      textMesh.sync();
      scene.add(textMesh);

      // Metin yüz normal vektörü GÜNCELLE
      TEXT_POS.set(offset.x, offset.y, offset.z);
    }

    function updateTitle(textStr) {
      buildTextLayers(textStr, getTextOffset(currentProduct));
    }

    // Metin yüz normal vektörü (rotation.y=PI → dünyada +z bakıyor)
    const TEXT_POS = new THREE.Vector3(0, -0.6, 1.8);
    const TEXT_NORMAL = new THREE.Vector3(0, 0, 1);

    // İlk metni oluştur
    updateTitle(currentProduct.title);

    // ─── LUMA SPLAT YÖNETİMİ ───
    let currentSplat = null;
    const loadingEl = document.getElementById('loading');

    function loadProduct(product) {
      loadingEl.classList.remove('fade');
      document.getElementById('loading-text').textContent = product.title + " YÜKLENİYOR";

      if (currentSplat) {
        scene.remove(currentSplat);
        currentSplat.dispose();
      }

      currentSplat = new LumaSplatsThree({
        source: product.lumaUrl,
        enableThreeShaderIntegration: false,
        particleRevealEnabled: !isMobile // Mobilde kasmasını engellemek için açılış efektini kapat
      });

      scene.add(currentSplat);
      currentProduct = product;
      updateTitle(product.title);

      currentSplat.onLoad = () => {
        loadingEl.classList.add('fade');
      };
      
      // Güvenlik zamanlayıcısı
      setTimeout(() => loadingEl.classList.add('fade'), 6000);
    }

    // İlk ürünü yükle
    loadProduct(currentProduct);

    // ─── ARAYÜZ (GALLERY MENU) ───
    const galleryMenu = document.getElementById('gallery-menu');
    
    function buildMenu() {
      galleryMenu.innerHTML = '';
      products.forEach(p => {
        const item = document.createElement('div');
        item.className = 'gallery-item' + (p.id === currentProduct.id ? ' active' : '');
        item.innerHTML = `
          <img src="${p.thumb}" alt="${p.title}">
          <div class="gallery-title">${p.title}</div>
        `;
        item.addEventListener('click', () => {
          if (p.id === currentProduct.id) return; // Aynı ürün
          
          // Menü aktif durumunu güncelle
          document.querySelectorAll('.gallery-item').forEach(el => el.classList.remove('active'));
          item.classList.add('active');
          
          currentProduct = p;
          loadProduct(currentProduct);
        });
        galleryMenu.appendChild(item);
      });
    }
    buildMenu();

    // ─── KONUM EDİTÖRÜ ───
    const slX = document.getElementById('sl-x'), valX = document.getElementById('val-x');
    const slY = document.getElementById('sl-y'), valY = document.getElementById('val-y');
    const slZ = document.getElementById('sl-z'), valZ = document.getElementById('val-z');
    const slS = document.getElementById('sl-s'), valS = document.getElementById('val-s');

    function syncSliders(offset) {
      slX.value = offset.x; valX.textContent = (+offset.x).toFixed(1);
      slY.value = offset.y; valY.textContent = (+offset.y).toFixed(1);
      slZ.value = offset.z; valZ.textContent = (+offset.z).toFixed(1);
      slS.value = offset.s; valS.textContent = (+offset.s).toFixed(2);
    }

    function getCurrentOffset() {
      return { x: +slX.value, y: +slY.value, z: +slZ.value, s: +slS.value };
    }

    // Slider değişince canlı güncelleme
    [slX, slY, slZ, slS].forEach(sl => {
      sl.addEventListener('input', () => {
        const o = getCurrentOffset();
        valX.textContent = o.x.toFixed(1);
        valY.textContent = o.y.toFixed(1);
        valZ.textContent = o.z.toFixed(1);
        valS.textContent = o.s.toFixed(2);
        buildTextLayers(currentProduct.title, o);
      });
    });

    // Göster/gizle
    document.getElementById('pos-toggle').addEventListener('click', () => {
      const p = document.getElementById('pos-panel');
      p.style.display = p.style.display === 'block' ? 'none' : 'block';
      if (p.style.display === 'block') syncSliders(getTextOffset(currentProduct));
    });

    // Kaydet
    document.getElementById('pos-save').addEventListener('click', async () => {
      const offset = getCurrentOffset();
      currentProduct.textOffset = offset;
      // Ürünler listesini güncelle
      const idx = products.findIndex(p => p.id === currentProduct.id);
      if (idx !== -1) products[idx] = currentProduct;
      localStorage.setItem('vk_3d_products', JSON.stringify(products));

      // API'ye kaydet
      try {
        await fetch('https://vk-portfolio-api.vkesgin38.workers.dev/api/fitness', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ key: 'vk_3d_products', value: JSON.stringify(products) })
        });
      } catch(e) {}

      document.getElementById('pos-panel').style.display = 'none';
      alert('✔ Konum kaydedildi!');
    });

    // Slider'ları ilk ürüne göre ayarla
    syncSliders(getTextOffset(currentProduct));

    // ─── KAMERA VE ANİMASYON ───
    let autoAngle = 0;
    let targetVert = 0.2; 
    let currentVert = 0.2;
    let isDragging = false;
    let dragY = 0, dragStartVert = 0;

    // Fare ile yukarı/aşağı bakış (orijinal sistem ama artırılmış dikey limit)
    canvas.addEventListener('mousedown', e => { isDragging = true; dragY = e.clientY; dragStartVert = targetVert; });
    window.addEventListener('mousemove', e => {
      if (!isDragging) return;
      targetVert = Math.max(-0.6, Math.min(1.8, dragStartVert + (e.clientY - dragY) / window.innerHeight * 2.5));
    });
    window.addEventListener('mouseup', () => isDragging = false);
    canvas.addEventListener('mouseleave', () => isDragging = false);

    // Dokunmatik
    canvas.addEventListener('touchstart', e => { dragY = e.touches[0].clientY; dragStartVert = targetVert; }, {passive:true});
    canvas.addEventListener('touchmove', e => {
      e.preventDefault();
      targetVert = Math.max(-0.6, Math.min(1.8, dragStartVert + (e.touches[0].clientY - dragY) / window.innerHeight * 2.5));
    }, {passive:false});

    const clock = new THREE.Clock();

    function animate() {
      requestAnimationFrame(animate);
      const dt = clock.getDelta();
      const time = clock.getElapsedTime();

      // Orijinal Kusursuz Kamera Matematiği
      currentVert += (targetVert - currentVert) * 0.05;
      autoAngle += dt * 0.5; // Orijinal yavaş dönüş hızı
      
      camera.position.x = 5 * Math.sin(autoAngle);
      camera.position.z = 5 * Math.cos(autoAngle);
      camera.position.y = 2 + currentVert * 4.5; // Yüksekliği çok daha fazla artırabilmek için çarpan büyütüldü
      
      camera.lookAt(0, 0, 0);

      // Partikülleri yavaşça döndür
      particles.rotation.y = time * 0.05;

      // ── METİN GÖRÜNÜRLÜĞÜ + ŞİMMER ──
      if (textMesh) {
        const toCam = camera.position.clone().sub(TEXT_POS);
        const dot = toCam.dot(TEXT_NORMAL);
        // Pürüzsüz geçiş: önde=1, kenarda=geçiş, arkada=0
        const target = dot > 0.5 ? 1 : (dot > -0.8 ? (dot + 0.8) / 1.3 : 0);
        currentTextOpacity += (target - currentTextOpacity) * 0.07;

        // Shimmer: iki sin dalgası üst üste → organik parıltı
        const shimmer = 0.6 + Math.sin(time * 1.6) * 0.25 + Math.sin(time * 4.1) * 0.1;
        const baseOp = Math.max(0, Math.min(1, currentTextOpacity));

        textMesh.material.opacity = baseOp * 0.95;
        textExtrusions.forEach((t, i) => {
          t.material.opacity = baseOp * Math.max(0, 0.44 - i * 0.062);
        });

        // Shimmer için renk değişimi (beyaz → altın)
        const c = new THREE.Color();
        c.setHSL(0.08, shimmer * 0.4, 0.9 + Math.sin(time * 1.6) * 0.05);
        textMesh.material.color = c;
      }

      renderer.render(scene, camera);
    }
    animate();

    // Pencere yeniden boyutlandırma
    window.addEventListener('resize', () => {
      camera.aspect = window.innerWidth / window.innerHeight;
      camera.updateProjectionMatrix();
      renderer.setSize(window.innerWidth, window.innerHeight);
    });
  </script>
</body>
</html>
