<!DOCTYPE html>
<html lang="tr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>3D Ürün Gösterim — Veli Kesgin</title>
  <link rel="stylesheet" href="../assets/css/reset.css">
  <link rel="stylesheet" href="../assets/css/variables.css">
  <link rel="stylesheet" href="../assets/css/global.css">
  <style>
    body {
      margin: 0; padding: 0; overflow: hidden; background: #000;
    }
    #canvas-container {
      position: absolute; top: 0; left: 0; width: 100vw; height: 100vh;
      cursor: grab;
    }
    #canvas-container:active { cursor: grabbing; }
    
    #overlay-ui {
      position: absolute; top: 0; left: 0; width: 100%; height: 100%;
      pointer-events: none; z-index: 10;
      display: flex; flex-direction: column; justify-content: space-between;
      padding: var(--space-xl);
    }
    .top-bar {
      display: flex; justify-content: space-between; align-items: flex-start;
      pointer-events: auto;
    }
    .back-btn {
      display: inline-flex; align-items: center; gap: 8px;
      color: var(--text-primary); text-decoration: none;
      font-family: var(--font-mono); font-size: 12px; letter-spacing: .1em;
      text-transform: uppercase;
      background: rgba(0,0,0,0.5); padding: 12px 20px; border-radius: 30px;
      backdrop-filter: blur(10px); border: 1px solid rgba(255,255,255,0.1);
      transition: all .3s;
    }
    .back-btn:hover { background: rgba(255,255,255,0.1); border-color: var(--accent); color: var(--accent); }
    
    .product-title {
      font-family: var(--font-display); font-size: 32px; color: #fff;
      margin: 0; text-shadow: 0 4px 12px rgba(0,0,0,0.5);
    }
    .instruction {
      font-family: var(--font-mono); font-size: 10px; color: var(--accent);
      letter-spacing: .2em; text-transform: uppercase; margin-top: 8px;
    }
    
    .bottom-bar {
      pointer-events: auto;
      display: flex; gap: 12px; overflow-x: auto; padding-bottom: 16px;
      scrollbar-width: none;
    }
    .bottom-bar::-webkit-scrollbar { display: none; }
    
    .product-thumb {
      width: 60px; height: 60px; border-radius: 12px;
      background: #111; border: 2px solid rgba(255,255,255,0.1);
      cursor: pointer; overflow: hidden; flex-shrink: 0;
      transition: all .3s;
    }
    .product-thumb.active, .product-thumb:hover { border-color: var(--accent); transform: translateY(-4px); }
    .product-thumb img { width: 100%; height: 100%; object-fit: cover; }
    
    #loading-screen {
      position: fixed; inset: 0; background: #000; z-index: 100;
      display: flex; align-items: center; justify-content: center;
      color: var(--accent); font-family: var(--font-mono); letter-spacing: .2em;
      transition: opacity .5s;
    }
  </style>
</head>
<body>

  <div id="loading-screen">YÜKLENİYOR...</div>

  <div id="canvas-container"></div>

  <div id="overlay-ui">
    <div class="top-bar">
      <div>
        <h1 class="product-title" id="p-title">Ürün Gösterimi</h1>
        <div class="instruction">Çevirmek için sürükleyin</div>
      </div>
      <a href="/" class="back-btn">
        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M19 12H5M12 19l-7-7 7-7"/></svg>
        Geri Dön
      </a>
    </div>
    
    <div class="bottom-bar" id="product-list">
      <!-- Thumbs via JS -->
    </div>
  </div>

  <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.2/gsap.min.js"></script>
  <script src="../assets/js/urungosterim.js"></script>

</body>
</html>
